<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Saber 11 - Dentalmovilr4</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 90%; max-width: 450px; text-align: center; }
        .marca { color: #3498db; font-weight: bold; margin-bottom: 10px; font-size: 0.9rem; text-transform: uppercase; }
        .timer { font-size: 2.2rem; font-weight: bold; color: #dc3545; margin: 15px 0; padding: 10px; border: 3px solid #dc3545; border-radius: 12px; display: inline-block; min-width: 130px; background: #fff5f5; }
        h2 { color: #1a73e8; font-size: 1.1rem; margin: 15px 0; min-height: 3em; line-height: 1.4; }
        .opcion { display: block; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; background: white; font-size: 1rem; transition: 0.3s; }
        .opcion:hover:not(:disabled) { background: #f8f9fa; border-color: #1a73e8; }
        .opcion:disabled { opacity: 0.7; cursor: not-allowed; }
        #btn-siguiente { margin-top: 20px; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; display: none; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card" id="contenedor-quiz">
        <p class="marca">DENTALMOVILR4 PRESENTA: RETO AURA SABER 11</p>
        <div id="progreso" style="font-size: 0.8rem; color: #666;">Cargando...</div>
        <div class="timer" id="reloj">02:00</div>
        <h2 id="enunciado">Cargando pregunta...</h2>
        <div id="opciones"></div>
        <div id="feedback" style="margin-top:15px; font-weight:bold;"></div>
        <button id="btn-siguiente" onclick="siguiente()">Siguiente Pregunta →</button>
    </div>

    <script>
        let preguntas = [];
        let indice = 0;
        let aciertos = 0;
        let tiempo = 120; 
        let intervalo;

        async function cargar() {
            try {
                const res = await fetch('/api/preguntas');
                preguntas = await res.json();
                if(preguntas.length > 0) mostrar();
            } catch (err) { console.error(err); }
        }

        function iniciarReloj() {
            clearInterval(intervalo);
            tiempo = 120;
            document.getElementById('reloj').innerText = "02:00";
            intervalo = setInterval(() => {
                tiempo--;
                const min = Math.floor(tiempo / 60);
                const seg = tiempo % 60;
                document.getElementById('reloj').innerText = `${min}:${seg < 10 ? '0' : ''}${seg}`;
                if (tiempo <= 0) {
                    clearInterval(intervalo);
                    bloquearOpciones("¡TIEMPO AGOTADO!");
                }
            }, 1000);
        }

        function mostrar() {
            const p = preguntas[indice];
            document.getElementById('progreso').innerText = `PREGUNTA ${indice + 1} DE ${preguntas.length}`;
            document.getElementById('enunciado').innerText = p.enunciado;
            const contenedor = document.getElementById('opciones');
            const feedback = document.getElementById('feedback');
            contenedor.innerHTML = ''; feedback.innerText = '';
            document.getElementById('btn-siguiente').style.display = 'none';
            iniciarReloj();

            p.opciones.forEach(o => {
                const b = document.createElement('button');
                b.className = 'opcion';
                b.innerText = o.texto;
                b.onclick = () => {
                    clearInterval(intervalo);
                    if(o.correcta) {
                        aciertos++;
                        feedback.style.color = '#28a745';
                        feedback.innerText = '¡CORRECTO!';
                    } else {
                        feedback.style.color = '#dc3545';
                        feedback.innerText = 'INCORRECTO';
                    }
                    bloquearOpciones();
                };
                contenedor.appendChild(b);
            });
        }

        function bloquearOpciones(msg) {
            if(msg) document.getElementById('feedback').innerText = msg;
            document.querySelectorAll('.opcion').forEach(b => b.disabled = true);
            document.getElementById('btn-siguiente').style.display = 'block';
        }

        function siguiente() {
            indice++;
            if(indice < preguntas.length) {
                mostrar();
            } else {
                const puntaje = Math.round((aciertos / preguntas.length) * 500);
                document.getElementById('contenedor-quiz').innerHTML = `
                    <p class="marca">DENTALMOVILR4 - RESULTADOS</p>
                    <h2 style="font-size: 1.5rem;">🎉 SIMULACRO FINALIZADO</h2>
                    <div style="font-size: 3.5rem; font-weight: bold; color: #1a73e8; margin: 20px 0;">${puntaje}/500</div>
                    <button onclick="location.reload()" style="padding: 15px; width: 100%; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">REINTENTAR</button>
                `;
            }
        }
        cargar();
    </script>
</body>
</html>
